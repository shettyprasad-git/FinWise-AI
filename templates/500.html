{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}
{% block content %}
<div class="container py-6 text-center">
  <div class="error-page-icon mx-auto mb-4" style="font-size:6rem;color:#e5e7eb;">
    <i class="bi bi-exclamation-octagon"></i>
  </div>
  <h1 class="display-4 fw-bold text-dark mb-3">500</h1>
  <p class="lead text-muted mb-4">Something went wrong on our end. Please try again later.</p>
  <a href="{{ url_for('index') }}" class="btn btn-fw-primary px-5 py-2">
    <i class="bi bi-house-door me-2"></i>Back to Home
  </a>
</div>
{% endblock %}
